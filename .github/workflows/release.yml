name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          lfs: false

      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2.4.1
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # rust-toolchain.toml pins nightly-2025-11-15 + wasm32-unknown-unknown.
      # `rustup show` installs that exact toolchain on GHA runners; matches
      # test.yml + desktop-compat.yml so the published bundle is byte-identical
      # to what CI tested. Plain @stable would leave the nightly missing and
      # `wasm-pack build` would fail with "toolchain not installed" — exactly
      # the regression observed on Release #403 after #657 untracked the wasm.
      - name: Setup Rust (pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cargo cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          prefix-key: release

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: latest

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Cache + fetch fixtures so cross-package tests that load
      # tests/models/ifc5/*.ifcx (pointcloud, export, ifcx) can run.
      # Mirrors the Test workflow; key changes only when the manifest does.
      - name: Cache test fixtures
        id: fixtures-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tests/models
          # Namespace cache key separately from `test.yml` (which uses
          # `ci-fixtures-…`). Phase A hardening — keeps the privileged
          # release runner from ever reading a cache writeable by a
          # fork-triggered job. See AGENTS.md security notes.
          key: release-fixtures-${{ runner.os }}-${{ hashFiles('tests/models/manifest.json') }}

      - name: Fetch fixtures
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        run: pnpm fixtures

      - name: Verify fixtures
        run: pnpm fixtures:check

      - name: Build Packages
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: true

      # Verify every publishable package can be loaded by Node's native ESM
      # resolver. Catches broken relative imports (e.g. extensionless specifiers
      # that bundlers tolerate but Node rejects with ERR_MODULE_NOT_FOUND)
      # before they reach npm consumers. Must run BEFORE `pnpm run release`
      # so a regression blocks the publish step.
      - name: Verify ESM entrypoints
        run: pnpm test:esm

      - name: Run Tests
        run: pnpm test

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get Version
        id: get-version
        if: steps.changesets.outputs.published == 'true'
        run: |
          # Read the root release version (sync-versions.js keeps it aligned to the highest released workspace package version)
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        run: |
          # Create the v* tag (changesets creates @scope/package@version tags, not v* tags)
          git tag "v${{ steps.get-version.outputs.version }}" || true
          git push origin "v${{ steps.get-version.outputs.version }}" || true
          # Create release, skipping if it already exists
          if gh release view "v${{ steps.get-version.outputs.version }}" > /dev/null 2>&1; then
            echo "Release v${{ steps.get-version.outputs.version }} already exists, skipping"
          else
            gh release create "v${{ steps.get-version.outputs.version }}" \
              --title "v${{ steps.get-version.outputs.version }}" \
              --notes "See CHANGELOG.md for details"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Verify every published package is actually reachable on npm.
  # Catches packages accidentally skipped during release before users hit them.
  verify-npm-publish:
    name: Verify npm publish
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          lfs: false
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@eae0cfeb286e66ffb5155f1a79b90583a127a68b # v2.4.1
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify all packages on npm
        # New packages can take longer to appear in npm metadata after publish.
        # Retry for up to ~4 minutes before failing.
        run: node scripts/verify-npm-publish.js --retries 12 --delay 20000
