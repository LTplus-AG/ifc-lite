name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build + WASM + Rust + Node
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fixtures live in a GitHub Release (see tests/models/manifest.json
          # and AGENTS.md §9). The repo no longer uses Git LFS — explicitly
          # disable the smudge filter so a stray .gitattributes can't
          # reintroduce it on a contributor branch.
          lfs: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # rust-toolchain.toml pins nightly-2025-11-15 with wasm32-unknown-unknown
      # + rust-src. `rustup show` triggers install of exactly that toolchain,
      # so cargo and wasm-pack both see the same channel as local devs.
      - name: Setup Rust (pinned by rust-toolchain.toml)
        run: rustup show

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Rebuild the wasm bindings from rust/wasm-bindings/ on every run.
      # packages/wasm/pkg/ is committed but goes stale whenever Rust changes
      # ship without a maintainer running scripts/build-wasm.sh first; this
      # step catches Rust → wasm breakage before downstream consumers see it.
      - name: Build WASM
        run: bash scripts/build-wasm.sh

      # `pnpm test` is `pnpm -r test` (not turbo), so the test command for one
      # package can't auto-build its workspace dependencies. Without this step,
      # cross-package imports like `@ifc-lite/data` fail to resolve from
      # `dist/` and tests like packages/lists abort with
      # "Failed to resolve entry for package".
      - name: Build packages
        run: pnpm build

      # Cache the fetched fixture tree keyed on the manifest hash. ~994 MiB.
      # Cache hit = no network. Cache miss (manifest changed) = one cold pull
      # from the GitHub Release CDN. Pattern documented in AGENTS.md §9.
      - name: Cache test fixtures
        id: fixtures-cache
        uses: actions/cache@v4
        with:
          path: tests/models
          key: fixtures-${{ hashFiles('tests/models/manifest.json') }}

      - name: Fetch fixtures
        if: steps.fixtures-cache.outputs.cache-hit != 'true'
        run: pnpm fixtures

      - name: Verify fixtures
        run: pnpm fixtures:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Workspace exclusions:
      #   - ifc-lite-wasm: dev-deps on wasm-bindgen-test; tests target wasm32.
      #   - ifc-lite-desktop: Tauri crate needs gtk/webkit2gtk system libs;
      #     desktop-compat.yml validates the desktop frontend separately.
      - name: Rust tests
        run: cargo test --workspace --exclude ifc-lite-wasm --exclude ifc-lite-desktop

      - name: Node tests
        run: pnpm test
